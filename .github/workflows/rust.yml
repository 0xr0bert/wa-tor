name: Rust CI

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install the stable Rust toolchain
      # We use dtolnay's action as it is the community standard and faster than rustup
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # 3. Cache dependencies to significantly speed up build times
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # 4. Enforce standard formatting (fails if you didn't run `cargo fmt`)
      - name: Check formatting
        run: cargo fmt --all -- --check

      # 5. Run Clippy to catch common mistakes and unidiomatic code
      # The `-D warnings` flag treats all warnings as errors, forcing clean code
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # 6. Build the project
      - name: Build
        run: cargo build --verbose